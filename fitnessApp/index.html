							<li><a href="#header" class="button icon solid solo fa-arrow-down scrolly">Continue</a></li>

				<!-- Main -->
					<div id="main">

						<!-- Featured Post -->
							<article class="post featured">
								<header class="major">
									<span class="date">Count your calories</span>
									<form>
										<label for="fage">Age:</label>
										<input type="text" id="fage" name="fage" required><br>
										<label for="fgender">Gender:</label>
										<input type="radio" id="male" name="gender" value="male">
									    <label for="male">Male</label><br>
									    <input type="radio" id="female" name="gender" value="female" checked="checked">
									    <label for="female">Female</label><br><br>
										<label for="lheight">Height(cm):</label>
										<input type="text" id="lheight" name="lheight" required><br>
										<label for="lweight">Weight(kg):</label>
										<input type="text" id="lweight" name="lweight" required><br>
										<label for="factivity">Activity:</label>
										<input type="radio" id="small" name="activity" value="1.2">
									    <label for="small">Little or no exercise</label><br>
									    <input type="radio" id="medium" name="activity" value="1.375" checked="checked">
									    <label for="medium">Exercise 1-3 times per week</label><br>
										<input type="radio" id="high" name="activity" value="1.9">
									    <label for="high">Exercise 5-7 times per week</label><br><br><br>
                                        <button type="button" onclick="calculateCalories('EN');">Count my calories</button>
										<input type="reset" value="Clear fields">
									  </form>
								</header>
							</article>
